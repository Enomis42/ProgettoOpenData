<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imprese Attive Italia - Premium Dashboard</title>
    <style>
        :root {
            --brand-blue: #185FA5;
            --text-main: #2c3e50;
            --text-sub: #7f8c8d;
            --bg-card: #f8f9fa;
            --danger: #d63031;
            --success: #27ae60;
            --border: #e9ecef;
        }

        * { box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; }
        body { background: #fff; margin: 0; padding: 20px; color: var(--text-main); }
        
        .wrap { max-width: 1100px; margin: auto; border: 1px solid var(--border); border-radius: 16px; padding: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }

        /* KPI Layout */
        .top-row { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: flex-start; gap: 20px; margin-bottom: 30px; }
        .kpi-block { display: flex; gap: 15px; flex-wrap: wrap; flex: 1; }
        .kpi { 
            background: var(--bg-card); 
            border-radius: 12px; 
            padding: 16px; 
            min-width: 180px;
            flex: 1;
            border: 1px solid var(--border);
        }
        .kpi-label { font-size: 11px; color: var(--text-sub); margin: 0; text-transform: uppercase; letter-spacing: 0.8px; font-weight: 600; }
        .kpi-val { font-size: 24px; font-weight: 700; margin: 6px 0; letter-spacing: -0.5px; }
        .kpi-sub { font-size: 12px; font-weight: 500; margin: 0; }
        .neg { color: var(--danger); }
        .pos { color: var(--success); }

        /* Zoom Buttons */
        .zoom-row { display: flex; background: var(--bg-card); padding: 4px; border-radius: 10px; border: 1px solid var(--border); }
        .zbtn { 
            font-size: 12px; font-weight: 600; padding: 8px 16px; border-radius: 8px; 
            border: none; cursor: pointer; background: transparent; color: var(--text-sub); transition: all 0.2s; 
        }
        .zbtn.on { background: #fff; color: var(--brand-blue); box-shadow: 0 2px 6px rgba(0,0,0,0.1); }

        /* Chart Area */
        .chart-container { position: relative; height: 400px; width: 100%; }
        
        /* Custom Tooltip */
        #tip {
            position: absolute; background: rgba(255,255,255,0.98); backdrop-filter: blur(4px);
            border: 1px solid #d1d1d1; border-radius: 8px; padding: 12px; 
            box-shadow: 0 8px 16px rgba(0,0,0,0.1); pointer-events: none; z-index: 100;
            min-width: 150px; display: none;
        }
    </style>
</head>
<body>

<div class="wrap">
    <div class="top-row">
        <div class="kpi-block">
            <div class="kpi">
                <p class="kpi-label">Valore Attuale</p>
                <p class="kpi-val" id="kv-last">—</p>
                <p class="kpi-sub" id="kv-last-date">Marzo 2025</p>
            </div>
            <div class="kpi">
                <p class="kpi-label">Variazione dal 2009</p>
                <p class="kpi-val" id="kv-delta">—</p>
                <p class="kpi-sub" id="kv-pct">—</p>
            </div>
            <div class="kpi">
                <p class="kpi-label">Massimo Storico</p>
                <p class="kpi-val" id="kv-peak">—</p>
                <p class="kpi-sub" id="kv-peak-date">—</p>
            </div>
        </div>
        <div class="zoom-row">
            <button class="zbtn" id="b3y" onclick="setZ('3y')">3 Anni</button>
            <button class="zbtn" id="b1y" onclick="setZ('1y')">1 Anno</button>
            <button class="zbtn on" id="bmax" onclick="setZ('max')">Tutto</button>
        </div>
    </div>

    <div class="chart-container">
        <canvas id="mc"></canvas>
        <div id="tip">
            <div style="font-weight:700; font-size:11px; color:#7f8c8d; margin-bottom:4px" id="tip-date"></div>
            <div style="font-size:18px; font-weight:700; color:#185FA5" id="tip-val"></div>
            <div style="font-size:11px; margin-top:6px; font-weight:600" id="tip-delta"></div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>

8-31",5120838],["2023-09-30",5120025],["2023-10-31",5117904],["2023-11-30",5115070],["2023-12-31",5097617],["2024-01-31",5070156],["2024-02-29",5073897],["2024-03-31",5083500],["2024-04-30",5089816],["2024-05-31",5093822],["2024-06-30",5094479],["2024-07-31",5095229],["2024-08-31",5095782],["2024-09-30",5097418],["2024-10-31",5089038],["2024-11-30",5078802],["2024-12-31",5052350],["2025-01-31",5029368],["2025-02-28",5034289],["2025-03-31",5044698]];

const mnames = ['Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'];
const fmt = v => v.toLocaleString('it-IT');

// Calcoli KPI
const lastVal = raw[raw.length-1][1];
const firstVal = raw[0][1];
const maxVal = Math.max(...raw.map(d=>d[1]));
const peakIdx = raw.findIndex(d => d[1] === maxVal);
const diffTot = lastVal - firstVal;
const pctTot = ((diffTot / firstVal) * 100).toFixed(1);

document.getElementById('kv-last').textContent = fmt(lastVal);
document.getElementById('kv-delta').textContent = (diffTot > 0 ? '+' : '') + fmt(diffTot);
const pctEl = document.getElementById('kv-pct');
pctEl.textContent = `${pctTot}% dal 2009`;
pctEl.className = 'kpi-sub ' + (diffTot >= 0 ? 'pos' : 'neg');
document.getElementById('kv-peak').textContent = fmt(maxVal);
const pDate = new Date(raw[peakIdx][0]);
document.getElementById('kv-peak-date').textContent = mnames[pDate.getMonth()] + ' ' + pDate.getFullYear();

let chart;

function initChart(startIndex = 0) {
    const dataSlice = raw.slice(startIndex);
    const ctx = document.getElementById('mc').getContext('2d');
    
    if(chart) chart.destroy();

    const gradient = ctx.createLinearGradient(0, 0, 0, 400);
    gradient.addColorStop(0, 'rgba(24, 95, 165, 0.25)');
    gradient.addColorStop(1, 'rgba(24, 95, 165, 0)');

    chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: dataSlice.map(d => d[0]),
            datasets: [{
                data: dataSlice.map(d => d[1]),
                borderColor: '#185FA5',
                borderWidth: 2.5,
                pointRadius: 0,
                pointHoverRadius: 5,
                pointHoverBackgroundColor: '#185FA5',
                pointHoverBorderColor: '#fff',
                pointHoverBorderWidth: 2,
                fill: true,
                backgroundColor: gradient,
                tension: 0.3
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            plugins: {
                legend: { display: false },
                tooltip: {
                    enabled: false,
                    external: function(context) {
                        const tip = document.getElementById('tip');
                        if (context.tooltip.opacity === 0) { tip.style.display = 'none'; return; }
                        
                        const i = context.tooltip.dataPoints[0].dataIndex;
                        const current = dataSlice[i][1];
                        const prev = i > 0 ? dataSlice[i-1][1] : current;
                        const diff = current - prev;
                        const d = new Date(dataSlice[i][0]);

                        document.getElementById('tip-date').textContent = mnames[d.getMonth()] + ' ' + d.getFullYear();
                        document.getElementById('tip-val').textContent = fmt(current);
                        const dEl = document.getElementById('tip-delta');
                        dEl.textContent = `${diff >= 0 ? '▲ +' : '▼ '}${fmt(diff)} vs mese prec.`;
                        dEl.style.color = diff >= 0 ? '#27ae60' : '#d63031';

                        tip.style.display = 'block';
                        const canvasWidth = context.chart.width;
                        const tipWidth = tip.offsetWidth;
                        let xPos = context.tooltip.caretX + 20;
                        if (xPos + tipWidth > canvasWidth) xPos = context.tooltip.caretX - tipWidth - 20;

                        tip.style.left = xPos + 'px';
                        tip.style.top = (context.tooltip.caretY - 50) + 'px';
                    }
                }
            },
            scales: {
                x: {
                    grid: { display: false },
                    ticks: {
                        maxRotation: 0,
                        autoSkip: false,
                        font: { size: 10, weight: '500' },
                        color: '#95a5a6',
                        callback: function(val, index) {
                            const d = new Date(dataSlice[index][0]);
                            const year = d.getFullYear();
                            // Logica: Mostra l'anno solo a Gennaio E se (anno - 2009) è divisibile per 3
                            if (d.getMonth() === 0) {
                                if (startIndex !== 0 || (year - 2009) % 3 === 0) {
                                    return year;
                                }
                            }
                            return '';
                        }
                    }
                },
                y: {
                    position: 'right',
                    grid: { color: 'rgba(0,0,0,0.04)', drawBorder: false },
                    ticks: {
                        color: '#95a5a6',
                        font: { size: 10 },
                        callback: v => (v/1000000).toFixed(1) + ' Mln'
                    }
                }
            }
        }
    });
}

function setZ(mode) {
    document.querySelectorAll('.zbtn').forEach(b => b.classList.remove('on'));
    document.getElementById('b' + mode).classList.add('on');
    
    let idx = 0;
    if(mode === '1y') idx = raw.length - 12;
    if(mode === '3y') idx = raw.length - 36;
    initChart(idx);
}

// Avvio
initChart(0);
</script>
